services:
  - type: web
    name: finscope-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finscope-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://finscope-ai.vercel.app,http://localhost:5173"

  - type: worker
    name: finscope-celery-worker
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A app.tasks.celery_app worker -l INFO"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finscope-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: finscope-api
          envVarKey: SECRET_KEY

  - type: worker
    name: finscope-celery-beat
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A app.tasks.celery_app beat -l INFO"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finscope-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: finscope-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: finscope-api
          envVarKey: SECRET_KEY

  - type: redis
    name: finscope-redis
    ipAllowList: []

databases:
  - name: finscope-db
    plan: free
